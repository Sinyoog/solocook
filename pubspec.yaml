name: cook
description: 자취요리 마스터 앱 프로젝트
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 데이터 저장 및 경로
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # 카메라 및 이미지 처리
  image_picker: ^1.0.4
  google_mlkit_text_recognition: ^0.11.0
  
  # 알림 및 UI
  flutter_local_notifications: ^17.2.1
  percent_indicator: ^4.2.3
  sqflite_common_ffi: ^2.4.0+3
  timezone: ^0.9.4
  cloud_firestore: ^6.4.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true